# pytest.ini
[pytest]
norecursedirs = .* .venv temp src site-packages
addopts = -vv -s --cov=src --cov-report=term-missing --cov-report=html  --cov-config=.coveragerc --durations=10
pythonpath = "src"
timeout = 120
markers =
    zvec: marks tests that require the zvec native extension (AVX-512 on x86_64; run on ARM64 or a compatible host)
filterwarnings =
    ignore::DeprecationWarning:pydantic.*
    ignore::DeprecationWarning:pkg_resources.*
    ignore::DeprecationWarning:google.rpc.*
    ignore::DeprecationWarning:google._upb.*
    ignore::DeprecationWarning:google.protobuf.*